{% extends 'superadmin/base.html' %}

{% block title %}SuperAdmin Login - SalesSmart{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card border-0 shadow-lg">
            <div class="card-header bg-gradient-primary text-white text-center py-4">
                <div class="mb-3">
                    <i class="fas fa-shield-alt fa-3x"></i>
                </div>
                <h3 class="mb-0">SuperAdmin Portal</h3>
                <p class="mb-0 opacity-75">SalesSmart Management System</p>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="fas fa-user me-2"></i>Username
                        </label>
                        <input type="text" class="form-control" id="username" name="username" 
                               value="quin" required>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-2"></i>Password
                        </label>
                        <input type="password" class="form-control" id="password" name="password" 
                               value="quin123" required>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt me-2"></i>Login to Portal
                        </button>
                    </div>
                </form>
                
                <div class="mt-4 text-center">
                    <small class="text-muted">
                        <i class="fas fa-info-circle me-1"></i>
                        Access restricted to super administrators only
                    </small>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-3">
            <a href="{% url 'pos:marketing' %}" class="text-decoration-none">
                <small class="text-muted">
                    <i class="fas fa-arrow-left me-1"></i>Back to SalesSmart
                </small>
            </a>
        </div>
    </div>
</div>

<style>
.bg-gradient-primary {
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
}

.card {
    margin-top: 10vh;
}

.form-control:focus {
    border-color: var(--accent-primary);
    box-shadow: 0 0 0 0.25rem rgba(102, 126, 234, 0.15);
}

.btn-lg {
    padding: 0.75rem 1.5rem;
    font-size: 0.9rem;
}
</style>
{% endblock %}
