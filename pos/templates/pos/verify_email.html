<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - SaleSmart POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .verification-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .verification-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0d6efd, #0056b3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            color: white;
            font-size: 2rem;
        }
        
        .verification-title {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        
        .verification-text {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .code-input {
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 10px;
            font-weight: 700;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .code-input:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        }
        
        .btn-verify {
            background: linear-gradient(135deg, #0d6efd, #0056b3);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        .btn-verify:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(13, 110, 253, 0.3);
            color: white;
        }
        
        .demo-note {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 0.9rem;
            color: #666;
        }
        
        .demo-code {
            font-weight: 700;
            color: #0d6efd;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="verification-container">
            <div class="verification-icon">
                <i class="fas fa-envelope"></i>
            </div>
            
            <h2 class="verification-title">Verify Your Email</h2>
            
            <p class="verification-text">
                We've sent a verification code to <strong>{{ email }}</strong>.<br>
                Please enter the code below to activate your account.
            </p>
            
            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="email" value="{{ email }}">
                
                <div class="mb-3">
                    <input type="text" 
                           name="verificationCode" 
                           class="form-control code-input" 
                           placeholder="000000"
                           maxlength="6"
                           pattern="[0-9]{6}"
                           required>
                </div>
                
                <button type="submit" class="btn btn-verify">
                    <i class="fas fa-check-circle me-2"></i> Verify Email
                </button>
            </form>
            
            <div class="demo-note">
                <i class="fas fa-info-circle"></i>
                <strong>Demo Mode:</strong> Use code <span class="demo-code">123456</span> to verify
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-focus on the verification code input
        document.addEventListener('DOMContentLoaded', function() {
            const codeInput = document.querySelector('.code-input');
            codeInput.focus();
            
            // Auto-submit when 6 digits are entered
            codeInput.addEventListener('input', function(e) {
                if (e.target.value.length === 6) {
                    // Small delay to show the full code before submitting
                    setTimeout(() => {
                        e.target.form.submit();
                    }, 500);
                }
            });
        });
    </script>
</body>
</html>
